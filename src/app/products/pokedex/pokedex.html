@if (allPokemon.isLoading()) {
<div class="loading-spinner">Loading Pokemon...</div>
} @else if (allPokemon.error()) {
<div class="error">{{ allPokemon.error() }}</div>
} @else {
@for(pokemon of dataSource(); track pokemon.name) {
<h2>name: {{ pokemon.name }}</h2>

<h3>type: {{ pokemon.types }}</h3>
}
}
