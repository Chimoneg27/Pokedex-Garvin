@if(loading$()) {
<div class="w-full h-full flex justify-center items-center">
  <mat-spinner></mat-spinner>
</div>
} @else if (error$()) {
  <div class="error bg-red-50 border-solid border-red-400 border! text-red-700 rounded-xl! px-4 py-3 mt-4 ml-4">
    {{ error$() }}
  </div>
} @else {
<div class="w-[80%] flex flex-col items-center m-5 p-6">
  <div class="form-box">
    <h1 class="text-3xl m-2">Add your team</h1>
  </div>

  <div class="w-full">
    <h2 class="text-2xl mb-4">All Available Teams</h2>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
      @for(team of teams$(); track team.id) {
        <div class="bg-white border-solid border-gray-200 border! rounded-xl! px-4 py-3 shadow-sm hover:shadow-md transition-shadow">
          <h2 class="text-lg font-semibold text-gray-800">{{ team.name }}</h2>
        </div>
      } @empty {
        <div class="col-span-full text-center text-gray-500 bg-gray-50 border-solid border-gray-200 border! rounded-xl! px-4 py-6">
          There are no teams to view
        </div>
      }
    </div>
  </div>
</div>
}
